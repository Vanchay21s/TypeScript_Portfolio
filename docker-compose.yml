# version: "1.0"
services:
  typescript-api:
    build: .
    container_name: typescript-api
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app
    #   - /app/node_modules
    depends_on:
      - postgres
  postgres:
    image: postgres:16
    container_name: postgres-typescript-api
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: